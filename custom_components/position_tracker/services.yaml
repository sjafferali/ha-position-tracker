set_position:
  name: Sync position
  description: >-
    Manually set a tracked angle to a known value in degrees. Use this when
    you know for certain where the source cover actually is (e.g., bed is
    fully flat — sync to 0) to correct accumulated drift.
  fields:
    entity_id:
      name: Tracked angle
      description: The position_tracker number entity to sync.
      required: true
      example: number.theater_bed_position_back_angle
      selector:
        entity:
          domain: number
          integration: position_tracker
    position:
      name: Angle
      description: The known angle in degrees (0 = flat).
      required: true
      example: 0
      default: 0
      selector:
        number:
          min: 0
          max: 180
          step: 1
          mode: box
